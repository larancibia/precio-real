services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-54330}:5432"
    volumes:
      - precio_real_postgres:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${API_HOST:-127.0.0.1}:${API_PORT:-8402}:8402"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8402/api/health\", timeout=3)'"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 10s

volumes:
  precio_real_postgres:
