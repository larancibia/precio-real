name: Deploy landing to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Cloudflare Analytics token
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: |
          if [ -n "$CF_ANALYTICS_TOKEN" ]; then
            find landing -name "*.html" -exec sed -i "s/TOKEN_PLACEHOLDER/${CF_ANALYTICS_TOKEN}/g" {} \;
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy landing --project-name=precio-real --commit-dirty=true
