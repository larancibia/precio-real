name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend tests
        working-directory: backend
        run: npm test

      - name: Extension tests
        run: node extension/tests/run.js

      - name: Validate extension manifest
        run: |
          node -e "const m=require('./extension/manifest.json'); if (m.manifest_version !== 3) throw new Error('manifest_version must be 3'); if (!m.version) throw new Error('missing version');"

