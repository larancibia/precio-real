name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install scraper dependencies
        run: python -m pip install -r scraper/requirements.txt

      - name: Backend tests
        working-directory: backend
        run: npm test

      - name: Extension tests
        run: node extension/tests/run.js

      - name: Validate extension manifest
        run: |
          node -e "const m=require('./extension/manifest.json'); if (m.manifest_version !== 3) throw new Error('manifest_version must be 3'); if (!m.version) throw new Error('missing version');"

      - name: Retailer config validation
        run: python -m pytest scraper/tests/test_retailers_config.py -q

      - name: Scraper tests
        run: python -m pytest scraper/tests -q

      - name: Scraper dry-run smoke
        run: python -m scraper.scraper --dry-run --max-queries 0
