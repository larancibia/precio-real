name = "precio-real-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
account_id = "5de70f4ba8110b9cf400a3157ff420c3"

routes = [
  { pattern = "precio-real.firemandeveloper.com/api/*", zone_name = "firemandeveloper.com" }
]

[[d1_databases]]
binding = "DB"
database_name = "precio-real"
database_id = "29336d7a-6496-451d-b6dd-9569e5bc0e2c"

[triggers]
# Hot Sale mode: refresh tracked products hourly so Monday price changes are
# reflected quickly in the extension while keeping the insert-only history.
crons = ["0 * * * *"]
